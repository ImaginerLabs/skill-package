# STATUS DEFINITIONS:
# ==================
# Epic Status:
#   - backlog: Epic not yet started
#   - in-progress: Epic actively being worked on
#   - done: All stories in epic completed
#
# Epic Status Transitions:
#   - backlog → in-progress: Automatically when first story is created (via create-story)
#   - in-progress → done: Manually when all stories reach 'done' status
#
# Story Status:
#   - backlog: Story only exists in epic file
#   - ready-for-dev: Story file created in stories folder
#   - in-progress: Developer actively working on implementation
#   - qa: Implementation complete, running QA test coverage validation (bmad-qa-generate-e2e-tests / bmad-testarch-automate)
#   - review: QA passed, ready for code review (bmad-code-review)
#   - done: Code review passed, story completed
#
# Retrospective Status:
#   - optional: Can be completed but not required
#   - done: Retrospective has been completed
#
# STORY LIFECYCLE (MANDATORY):
# ============================
# Every story MUST follow this complete lifecycle — no skipping steps:
#
#   backlog → ready-for-dev → in-progress → qa → review → done
#
# Phase Details:
#   1. ready-for-dev: Story file created via bmad-create-story with full context
#   2. in-progress: Developer (Amelia) implements tasks/subtasks with unit tests per task
#   3. qa: QA validation phase — run bmad-qa-generate-e2e-tests or bmad-testarch-automate
#      - Generate/update integration tests and E2E tests for the story's acceptance criteria
#      - Run full test suite (unit + integration + E2E) — ALL must pass 100%
#      - Record test coverage results in story file Dev Agent Record
#      - If tests fail → back to in-progress for fixes
#   4. review: Code review phase — run bmad-code-review (fresh context, different LLM recommended)
#      - Adversarial review across multiple quality facets
#      - If issues found → back to in-progress for fixes, then re-run qa
#      - If approved → move to done
#   5. done: Story completed with full implementation, test coverage, and code review sign-off
#
# GATE REQUIREMENTS:
# ==================
# in-progress → qa GATE:
#   - All tasks/subtasks marked [x] in story file
#   - Unit tests exist and pass for every task
#   - tsc --noEmit passes with zero errors
#
# qa → review GATE:
#   - Integration/E2E tests generated for all acceptance criteria
#   - Full test suite passes 100% (vitest run + playwright test if applicable)
#   - Test results documented in story file
#
# review → done GATE:
#   - Code review completed with no blocking issues
#   - All review findings resolved
#   - Story file Dev Agent Record updated with final status
#
# WORKFLOW NOTES:
# ===============
# - Epic transitions to 'in-progress' automatically when first story is created
# - Stories can be worked in parallel if team capacity allows
# - Developer typically creates next story after previous one is 'done' to incorporate learnings
# - Dev moves story to 'qa' after all tasks complete, then 'review' after QA passes
# - NEVER skip qa or review — these are mandatory quality gates

